<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="InstaLay">
  <!--
    InstaLay brand mark: rounded frame + tapestry photo-zones.
    Transparent outside the mark. Instagram-inspired diagonal gradient.
    Readable from ~16px to 256px+.
  -->
  <defs>
    <linearGradient id="ig" x1="48" y1="48" x2="464" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#833AB4"/>
      <stop offset="28%" stop-color="#C13584"/>
      <stop offset="52%" stop-color="#E1306C"/>
      <stop offset="78%" stop-color="#F77737"/>
      <stop offset="100%" stop-color="#FCAF45"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded frame (stroke only — no background fill) -->
  <rect
    x="40" y="40" width="432" height="432" rx="96" ry="96"
    stroke="url(#ig)" stroke-width="36" stroke-linejoin="round"
  />

  <!-- Tapestry photo-zones (gaps stay transparent for light/dark UI) -->
  <rect x="96" y="96" width="140" height="120" rx="16" ry="16" fill="url(#ig)"/>
  <rect x="264" y="96" width="152" height="176" rx="16" ry="16" fill="url(#ig)"/>
  <rect x="96" y="244" width="140" height="148" rx="16" ry="16" fill="url(#ig)"/>
  <rect x="264" y="300" width="152" height="92" rx="16" ry="16" fill="url(#ig)"/>
  <rect x="96" y="416" width="320" height="28" rx="14" ry="14" fill="url(#ig)"/>
</svg>
