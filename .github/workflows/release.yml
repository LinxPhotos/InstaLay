name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VER="${{ inputs.version }}"
          else
            REF="${GITHUB_REF_NAME}"
            VER="${REF#v}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            flutter: action
          - os: windows-11-arm
            platform: windows
            arch: arm64
            flutter: git
          - os: macos-15
            platform: macos
            arch: arm64
            flutter: action
          # macos-13 (Intel) runners are frequently unavailable; arm64 builds
          # run under Rosetta on Intel Macs. Re-add when capacity improves.
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            flutter: action
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            flutter: git
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter (action)
        if: matrix.flutter == 'action'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Flutter (git clone — Linux ARM)
        if: matrix.flutter == 'git' && runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          FLUTTER_ROOT="${HOME}/flutter"
          if [[ ! -d "$FLUTTER_ROOT" ]]; then
            git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$FLUTTER_ROOT"
          fi
          echo "$FLUTTER_ROOT/bin" >> "$GITHUB_PATH"
          export PATH="$FLUTTER_ROOT/bin:$PATH"
          flutter --version
          flutter config --no-analytics
          flutter precache

      - name: Setup Flutter (git clone — Windows ARM)
        if: matrix.flutter == 'git' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $flutterRoot = Join-Path $env:USERPROFILE 'flutter'
          if (-not (Test-Path $flutterRoot)) {
            git clone https://github.com/flutter/flutter.git -b stable --depth 1 $flutterRoot
          }
          $bin = Join-Path $flutterRoot 'bin'
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          $env:Path = "$bin;$env:Path"
          flutter --version
          flutter config --no-analytics
          flutter precache

      - name: Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          # Flutter Linux desktop plugins often require extra native deps.
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev \
            liblzma-dev libstdc++-12-dev zip \
            xz-utils \
            libbrotli-dev libgif-dev libjpeg-dev libpng-dev libwebp-dev \
            libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev \
            libavif-dev libaom-dev libdav1d-dev

      - name: Install Inno Setup (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install innosetup 7zip -y --no-progress
          # Refresh PATH without dropping Flutter from GITHUB_PATH (applied on next step)
          $machine = [System.Environment]::GetEnvironmentVariable('Path','Machine')
          $user = [System.Environment]::GetEnvironmentVariable('Path','User')
          $env:Path = "$machine;$user;$env:Path"

      - name: Ensure Flutter on PATH
        shell: bash
        run: |
          command -v flutter || echo "flutter missing before pub get"
          flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Build libjxl static prebuilts (Windows x64)
        if: matrix.platform == 'windows' && matrix.arch == 'x64'
        shell: pwsh
        run: ./scripts/build_libjxl_prebuilt_windows.ps1

      - name: Build Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          flutter config --enable-windows-desktop
          flutter build windows --release
          if ($LASTEXITCODE -ne 0) {
            throw "flutter build windows failed with exit code $LASTEXITCODE"
          }
          $candidates = @(
            "build/windows/x64/runner/Release",
            "build/windows/arm64/runner/Release",
            "build/windows/runner/Release"
          )
          $input = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $input) { throw "Windows Release folder not found" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          ./scripts/package_windows.ps1 -Version "${{ needs.version.outputs.version }}" -Arch "${{ matrix.arch }}" -InputDir $input -OutputDir dist
          try {
            ./scripts/package_msix.ps1 -Version "${{ needs.version.outputs.version }}" -Arch "${{ matrix.arch }}" -OutputDir dist -Store
          } catch {
            Write-Warning "MSIX packaging failed (portable ZIP + setup EXE still published): $_"
          }
        env:
          MS_STORE_IDENTITY_NAME: ${{ secrets.MS_STORE_IDENTITY_NAME }}
          MS_STORE_PUBLISHER: ${{ secrets.MS_STORE_PUBLISHER }}
          MS_STORE_PUBLISHER_DISPLAY_NAME: ${{ secrets.MS_STORE_PUBLISHER_DISPLAY_NAME }}

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          flutter config --enable-macos-desktop
          flutter build macos --release
          chmod +x scripts/package.sh
          mkdir -p dist
          ./scripts/package.sh macos "${{ matrix.arch }}" "${{ needs.version.outputs.version }}" build/macos/Build/Products/Release dist

      - name: Build libjxl static prebuilts (Linux x64)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        run: |
          chmod +x scripts/build_libjxl_prebuilt.sh
          ./scripts/build_libjxl_prebuilt.sh 0.12.0 packages/jxl_ffi/native/prebuilt/linux-x86_64-static

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release
          chmod +x scripts/package.sh
          mkdir -p dist
          BUNDLE="$(find build/linux -type d -path '*/release/bundle' | head -n1)"
          if [[ -z "$BUNDLE" ]]; then
            echo "Linux bundle not found" >&2
            find build/linux -maxdepth 4 -type d || true
            exit 1
          fi
          ./scripts/package.sh linux "${{ matrix.arch }}" "${{ needs.version.outputs.version }}" "$BUNDLE" dist

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: instalay-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [version, build]
    if: needs.version.result == 'success' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download available artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        shell: bash
        run: |
          mkdir -p release-assets
          if [[ -d artifacts ]]; then
            find artifacts -type f -print0 | while IFS= read -r -d '' f; do
              cp "$f" "release-assets/$(basename "$f")"
            done
          fi
          count="$(find release-assets -type f | wc -l | tr -d ' ')"
          if [[ "$count" -eq 0 ]]; then
            echo "No release assets produced by any build matrix leg." >&2
            exit 1
          fi
          chmod +x scripts/release_notes.sh
          scripts/release_notes.sh "${{ needs.version.outputs.version }}" release-assets > release-body.md
          (
            cd release-assets
            sha256sum * > SHA256SUMS 2>/dev/null || shasum -a 256 * > SHA256SUMS
          )
          cat release-body.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: InstaLay ${{ needs.version.outputs.tag }}
          body_path: release-body.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
