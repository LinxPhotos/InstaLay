name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install & build
        working-directory: website
        env:
          # Keep project path until instalay.linx.photos DNS exists
          GITHUB_PAGES_BASE: /
          VITE_STRIPE_PAYMENT_LINK: ${{ secrets.VITE_STRIPE_PAYMENT_LINK }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
        run: |
          pnpm install --frozen-lockfile || pnpm install
          pnpm build
          if [ -d .output/public ]; then
            OUT=".output/public"
          elif [ -d dist ]; then
            OUT="dist"
          else
            echo "Static output folder not found" >&2
            find . -maxdepth 3 -type d
            exit 1
          fi
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          # No CNAME until custom domain DNS points here (avoids apex/base mismatch)
          touch "$OUT/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/${{ env.OUT }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
