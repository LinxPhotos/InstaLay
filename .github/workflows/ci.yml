name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Linux deps
        run: |
          sudo apt-get update -y
          # Flutter Linux desktop plugins often require extra native deps.
          # Keep this in sync with release.yml's Linux dependency set.
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev \
            liblzma-dev libstdc++-12-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-good1.0-dev \
            libavif-dev libaom-dev libdav1d-dev
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
