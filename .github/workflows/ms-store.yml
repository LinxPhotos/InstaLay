name: Microsoft Store package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Partner Center upload checklist
        run: |
          cat <<'EOF'
          Microsoft Store upload checklist
          --------------------------------
          1. Download InstaLay-*-windows-*-store.msix from the GitHub Release assets.
          2. Partner Center → InstaLay → Packages → upload MSIX.
          3. Ensure pubspec msix_config identity/publisher match Product Identity.
          4. Prefer free Store listing (InstaLay Free) + link to buy, or add-ons at USD $30/year and $100 lifetime.
          5. Optional secrets for CI overrides: MS_STORE_IDENTITY_NAME, MS_STORE_PUBLISHER,
             MS_STORE_PUBLISHER_DISPLAY_NAME.

          Docs: packaging/ms-store/README.adoc
          EOF
